server.port=${PORT:4000}
spring.application.name=home

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/homefix?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sriyan}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.cors.allowed-origins=${CORS_ORIGIN:*}
app.jwt.issuer=${JWT_ISSUER:homefix-pro}
app.jwt.secret=${JWT_SECRET:change-this-development-secret-before-production}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
